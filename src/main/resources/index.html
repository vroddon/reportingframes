<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestine — FrameNet Annotator</title>
  <style>
    body {
      font-family: monospace;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
      color: #222;
    }
    h1 { font-size: 1.4em; margin-bottom: 4px; }
    p.subtitle { color: #666; margin-top: 0; font-size: 0.9em; }
    textarea {
      width: 100%;
      height: 100px;
      font-family: monospace;
      font-size: 1em;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 3px;
      resize: vertical;
    }
    button {
      margin-top: 8px;
      padding: 8px 20px;
      font-size: 1em;
      cursor: pointer;
      background: #2c5f8a;
      color: white;
      border: none;
      border-radius: 3px;
    }
    button:disabled { background: #aaa; cursor: default; }
    #output {
      margin-top: 24px;
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 16px;
      min-height: 60px;
      font-size: 0.95em;
      display: none;
    }
    #status { margin-top: 8px; color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Celestine — FrameNet Annotator</h1>
  <p class="subtitle">Frames: Conditional_scenario · Request · Time_period_of_action · Time_vector</p>

  <textarea id="sentence" placeholder="Paste a sentence here..."></textarea>
  <br>
  <button id="btn" onclick="annotate()">Annotate</button>
  <div id="status"></div>
  <pre id="output"></pre>

  <script>
    async function annotate() {
      const sentence = document.getElementById('sentence').value.trim();
      if (!sentence) return;

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const output = document.getElementById('output');

      btn.disabled = true;
      status.textContent = 'Annotating…';
      output.style.display = 'none';
      output.textContent = '';

      try {
        const resp = await fetch('/annotate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'sentence=' + encodeURIComponent(sentence)
        });
        const json = await resp.json();
        output.textContent = JSON.stringify(json, null, 2);
        output.style.display = 'block';
        status.textContent = resp.ok ? '' : 'Error from server.';
      } catch (e) {
        status.textContent = 'Request failed: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('sentence').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) annotate();
    });
  </script>
</body>
</html>
